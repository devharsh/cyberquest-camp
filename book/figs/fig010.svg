<svg viewBox="0 0 760 280" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="380" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Three different jobs, never mix them up</text><text x="110" y="48" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Type</text><text x="390" y="48" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">What it does</text><text x="650" y="48" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Examples</text><rect x="20" y="58" width="720" height="58" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><rect x="36" y="71" width="150" height="32" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="111" y="92" font-size="13.5" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Encoding</text><text x="390" y="92" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">reversible format change, no key</text><text x="650" y="92" font-size="11.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">ASCII, Base64, Unicode</text><rect x="20" y="128" width="720" height="58" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><rect x="36" y="141" width="150" height="32" rx="8" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="111" y="162" font-size="13.5" fill="#d97706" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Encryption</text><text x="390" y="162" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">scramble with a secret key</text><text x="650" y="162" font-size="11.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">AES, RSA</text><rect x="20" y="198" width="720" height="58" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><rect x="36" y="211" width="150" height="32" rx="8" fill="#fff" stroke="#0891b2" stroke-width="2"/><text x="111" y="232" font-size="13.5" fill="#0891b2" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Hashing</text><text x="390" y="232" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">one-way fingerprint, no key</text><text x="650" y="232" font-size="11.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">MD5, SHA-256, SHA-3</text></svg>