<svg viewBox="0 0 740 228" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">A salt makes identical passwords hash to different fingerprints</text><text x="135" y="52" font-size="11.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">User A</text><rect x="30" y="62" width="210" height="34" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="135" y="84" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">salt9 + sunshine</text><line x1="240" y1="79" x2="290" y2="79" stroke="#2563eb" stroke-width="2.5"/><polygon points="290,73 300,79 290,85" fill="#2563eb"/><rect x="300" y="62" width="110" height="34" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="355" y="84" font-size="12" fill="#7c3aed" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SHA-256</text><line x1="410" y1="79" x2="460" y2="79" stroke="#2563eb" stroke-width="2.5"/><polygon points="460,73 470,79 460,85" fill="#2563eb"/><rect x="470" y="62" width="250" height="34" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="595" y="84" font-size="12" fill="#15803d" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">a3f1c9 ... 7e  (unique)</text><text x="135" y="134" font-size="11.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">User B  (same password)</text><rect x="30" y="144" width="210" height="34" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="135" y="166" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">salt7 + sunshine</text><line x1="240" y1="161" x2="290" y2="161" stroke="#2563eb" stroke-width="2.5"/><polygon points="290,155 300,161 290,167" fill="#2563eb"/><rect x="300" y="144" width="110" height="34" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="355" y="166" font-size="12" fill="#7c3aed" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SHA-256</text><line x1="410" y1="161" x2="460" y2="161" stroke="#2563eb" stroke-width="2.5"/><polygon points="460,155 470,161 460,167" fill="#2563eb"/><rect x="470" y="144" width="250" height="34" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="595" y="166" font-size="12" fill="#15803d" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">9b2e74 ... 1d  (different)</text><text x="360" y="210" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Attackers can no longer crack many accounts with one precomputed table</text></svg>