<svg viewBox="0 0 760 160" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="380" y="26" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">How a small flaw becomes real risk</text><rect x="8" y="58" width="104" height="46" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/><text x="60.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Flaw</text><line x1="112" y1="81" x2="118" y2="81" stroke="#64748b" stroke-width="2.5"/><polygon points="118,75 128,81 118,87" fill="#64748b"/><rect x="128" y="58" width="104" height="46" rx="9" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><text x="180.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Vulnerability</text><line x1="232" y1="81" x2="238" y2="81" stroke="#64748b" stroke-width="2.5"/><polygon points="238,75 248,81 238,87" fill="#64748b"/><rect x="248" y="58" width="104" height="46" rx="9" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="300.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Threat</text><line x1="352" y1="81" x2="358" y2="81" stroke="#64748b" stroke-width="2.5"/><polygon points="358,75 368,81 358,87" fill="#64748b"/><rect x="368" y="58" width="104" height="46" rx="9" fill="#fde2e2" stroke="#dc2626" stroke-width="2"/><text x="420.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Attack</text><line x1="472" y1="81" x2="478" y2="81" stroke="#64748b" stroke-width="2.5"/><polygon points="478,75 488,81 478,87" fill="#64748b"/><rect x="488" y="58" width="104" height="46" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="540.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Exploitation</text><line x1="592" y1="81" x2="598" y2="81" stroke="#64748b" stroke-width="2.5"/><polygon points="598,75 608,81 598,87" fill="#64748b"/><rect x="608" y="58" width="104" height="46" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="660.0" y="86" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Risk</text><text x="380" y="140" font-size="11.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">A flaw is a vulnerability; a threat launches an attack that exploits it; risk is the chance of loss.</text></svg>