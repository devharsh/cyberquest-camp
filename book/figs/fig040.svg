<svg viewBox="0 0 780 300" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="380" y="20" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">HTTPS uses public-key crypto to agree a key, then fast symmetric crypto</text><rect x="40" y="38" width="180" height="72" rx="12" fill="#eef3fb" stroke="#2563eb" stroke-width="2"/><text x="130" y="70" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Client</text><text x="130" y="90" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">browser</text><rect x="540" y="38" width="200" height="72" rx="12" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="640" y="66" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Server</text><circle cx="600" cy="86" r="9" fill="none" stroke="#2563eb" stroke-width="4"/><line x1="608" y1="86" x2="630" y2="86" stroke="#2563eb" stroke-width="4"/><line x1="624" y1="86" x2="624" y2="94" stroke="#2563eb" stroke-width="4"/><line x1="630" y1="86" x2="630" y2="94" stroke="#2563eb" stroke-width="4"/><circle cx="660" cy="86" r="9" fill="none" stroke="#dc2626" stroke-width="4"/><line x1="668" y1="86" x2="690" y2="86" stroke="#dc2626" stroke-width="4"/><line x1="684" y1="86" x2="684" y2="94" stroke="#dc2626" stroke-width="4"/><line x1="690" y1="86" x2="690" y2="94" stroke="#dc2626" stroke-width="4"/><line x1="130" y1="110" x2="130" y2="278" stroke="#cbd5e1" stroke-width="2"/><line x1="640" y1="110" x2="640" y2="278" stroke="#cbd5e1" stroke-width="2"/><line x1="135" y1="148" x2="635" y2="148" stroke="#475569" stroke-width="2"/><text x="385" y="139" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">TCP handshake</text><polygon points="143,143 133,148 143,153" fill="#475569"/><polygon points="627,143 637,148 627,153" fill="#475569"/><line x1="135" y1="184" x2="635" y2="184" stroke="#475569" stroke-width="2"/><text x="385" y="175" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Certificate and public key</text><polygon points="143,179 133,184 143,189" fill="#475569"/><polygon points="627,179 637,184 627,189" fill="#475569"/><line x1="135" y1="220" x2="635" y2="220" stroke="#475569" stroke-width="2"/><text x="385" y="211" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Session key exchange</text><polygon points="143,215 133,220 143,225" fill="#475569"/><polygon points="627,215 637,220 627,225" fill="#475569"/><line x1="135" y1="256" x2="635" y2="256" stroke="#475569" stroke-width="2"/><text x="385" y="247" font-size="12" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Encrypted data (AES)</text><polygon points="143,251 133,256 143,261" fill="#475569"/><polygon points="627,251 637,256 627,261" fill="#475569"/></svg>