<svg viewBox="0 0 740 200" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Change one character and the whole fingerprint changes</text><rect x="40" y="46" width="250" height="40" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="165" y="71" font-size="14" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">"password"</text><line x1="290" y1="66" x2="350" y2="66" stroke="#7c3aed" stroke-width="2.5"/><polygon points="350,60 360,66 350,72" fill="#7c3aed"/><rect x="360" y="46" width="340" height="40" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="530" y="71" font-size="11.5" fill="#15803d" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">5e884898da...e1b98 (64 hex)</text><rect x="40" y="108" width="250" height="40" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="165" y="133" font-size="14" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">"Password"</text><line x1="290" y1="128" x2="350" y2="128" stroke="#7c3aed" stroke-width="2.5"/><polygon points="350,122 360,128 350,134" fill="#7c3aed"/><rect x="360" y="108" width="340" height="40" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="530" y="133" font-size="11.5" fill="#15803d" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">e7cf3ef4f17...c0c3a (64 hex)</text><text x="360" y="182" font-size="11.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">One capital letter, a completely different hash. This detects tampering.</text></svg>