<svg viewBox="0 0 740 160" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Python runs your code line by line and shows results at once</text><rect x="40" y="50" width="200" height="90" rx="12" fill="#eef3fb" stroke="#2563eb" stroke-width="2"/><text x="140" y="74" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Your code</text><text x="140" y="98" font-size="12" fill="#1d4ed8" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">agent = 'Ada'</text><text x="140" y="118" font-size="12" fill="#1d4ed8" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">print(agent)</text><line x1="240" y1="95" x2="320" y2="95" stroke="#64748b" stroke-width="2.5"/><polygon points="320,89 330,95 320,101" fill="#64748b"/><rect x="330" y="50" width="200" height="90" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="430" y="80" font-size="13" fill="#7c3aed" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Interpreter</text><text x="430" y="104" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">reads each line</text><text x="430" y="122" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">no compile step</text><line x1="530" y1="95" x2="610" y2="95" stroke="#64748b" stroke-width="2.5"/><polygon points="610,89 620,95 610,101" fill="#64748b"/><rect x="620" y="50" width="90" height="90" rx="12" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="665" y="90" font-size="11" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Output</text><text x="665" y="112" font-size="14" fill="#15803d" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Ada</text></svg>