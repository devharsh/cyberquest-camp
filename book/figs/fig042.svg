<svg viewBox="0 0 740 195" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="20" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">If a site echoes input without cleaning it, an attacker script runs in other browsers</text><rect x="30" y="44" width="180" height="70" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="120" y="72" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">attacker posts</text><text x="120" y="92" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">a script</text><line x1="210" y1="78" x2="310" y2="78" stroke="#64748b" stroke-width="2.5"/><polygon points="310,72 320,78 310,84" fill="#64748b"/><rect x="320" y="44" width="180" height="70" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><text x="410" y="72" font-size="12" fill="#d97706" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">site stores it</text><text x="410" y="92" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">without cleaning</text><line x1="500" y1="78" x2="600" y2="78" stroke="#dc2626" stroke-width="2.5"/><polygon points="600,72 610,78 600,84" fill="#dc2626"/><rect x="610" y="44" width="110" height="70" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="665" y="72" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">victim</text><text x="665" y="92" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">runs it</text><rect x="180" y="140" width="380" height="40" rx="10" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="370" y="165" font-size="12" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Defense: validate input and encode output</text></svg>