<svg viewBox="0 0 740 260" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Three families of cryptography and common algorithms</text><rect x="20" y="40" width="226" height="210" rx="14" fill="#eef3fb" stroke="#2563eb" stroke-width="2"/><text x="133" y="64" font-size="14" fill="#2563eb" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Symmetric keys</text><text x="133" y="84" font-size="10.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">same key to encrypt and decrypt</text><rect x="53" y="104" width="160" height="28" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="133" y="122" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">DES</text><rect x="53" y="138" width="160" height="28" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="133" y="156" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">TripleDES</text><rect x="53" y="172" width="160" height="28" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="133" y="190" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">AES</text><rect x="53" y="206" width="160" height="28" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="133" y="224" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">RC5</text><rect x="260" y="40" width="226" height="210" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="373" y="64" font-size="14" fill="#7c3aed" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Asymmetric keys</text><text x="373" y="84" font-size="10.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">public key and private key</text><rect x="293" y="104" width="160" height="28" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="373" y="122" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">RSA</text><rect x="293" y="138" width="160" height="28" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="373" y="156" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Elliptic Curve</text><rect x="293" y="172" width="160" height="28" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="373" y="190" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Diffie-Hellman</text><rect x="500" y="40" width="226" height="210" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="613" y="64" font-size="14" fill="#0891b2" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">One-way hash</text><text x="613" y="84" font-size="10.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">fingerprint, cannot reverse</text><rect x="533" y="104" width="160" height="28" rx="8" fill="#fff" stroke="#0891b2" stroke-width="2"/><text x="613" y="122" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">MD5</text><rect x="533" y="138" width="160" height="28" rx="8" fill="#fff" stroke="#0891b2" stroke-width="2"/><text x="613" y="156" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SHA-1</text><rect x="533" y="172" width="160" height="28" rx="8" fill="#fff" stroke="#0891b2" stroke-width="2"/><text x="613" y="190" font-size="12.5" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SHA-256</text></svg>