<svg viewBox="0 0 740 275" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="22" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Encryption cuts the chance of a costly breach</text><rect x="20" y="42" width="360" height="210" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="200" y="64" font-size="13" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Given</text><text x="40" y="92" font-size="12" fill="#64748b" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">P(breach | unencrypted)</text><text x="360" y="92" font-size="12" fill="#16203a" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">0.40</text><text x="40" y="118" font-size="12" fill="#64748b" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">P(breach | encrypted)</text><text x="360" y="118" font-size="12" fill="#16203a" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">0.08</text><text x="40" y="144" font-size="12" fill="#64748b" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">Loss per breach (ALE)</text><text x="360" y="144" font-size="12" fill="#16203a" font-weight="700" text-anchor="end" font-family="Segoe UI,Arial,sans-serif">$2,000,000</text><text x="200" y="182" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Risk = probability x loss</text><text x="40" y="206" font-size="11.5" fill="#dc2626" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">Unencrypted: 0.40 x 2,000,000 = $800,000</text><text x="40" y="228" font-size="11.5" fill="#16a34a" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">Encrypted:   0.08 x 2,000,000 = $160,000</text><rect x="400" y="42" width="320" height="210" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="560" y="64" font-size="12.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Expected annual loss</text><rect x="450" y="80" width="70" height="150" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="485" y="248" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">unencrypted</text><text x="485" y="72" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">$800k</text><rect x="600" y="200" width="70" height="30" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/><text x="635" y="248" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">encrypted</text><text x="635" y="192" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">$160k</text><text x="560" y="264" font-size="11.5" fill="#16203a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Risk reduction = $640,000 saved per year</text></svg>