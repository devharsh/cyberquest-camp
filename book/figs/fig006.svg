<svg viewBox="0 0 780 260" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="380" y="20" font-size="12.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">A password is one door; MFA adds a second the attacker does not have</text><rect x="20" y="36" width="360" height="214" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="200" y="60" font-size="13" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">ATTACK: password only</text><rect x="50" y="82" width="110" height="40" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="105" y="107" font-size="11" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">attacker</text><line x1="160" y1="102" x2="225" y2="102" stroke="#dc2626" stroke-width="2.5"/><polygon points="225,96 235,102 225,108" fill="#dc2626"/><rect x="238" y="96" width="34.0" height="30.0" rx="5" fill="#fde7f1" stroke="#dc2626" stroke-width="2"/><path d="M246,96 v-6 a9,9 0 0 1 18,0 v6" fill="none" stroke="#dc2626" stroke-width="2"/><circle cx="255" cy="110" r="3.5" fill="#dc2626"/><text x="200" y="152" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">tries common passwords</text><line x1="200" y1="164" x2="200" y2="172" stroke="#dc2626" stroke-width="2.5"/><polygon points="194,172 200,182 206,172" fill="#dc2626"/><rect x="120" y="182" width="160" height="34" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="200" y="204" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">ACCESS GRANTED</text><rect x="400" y="36" width="360" height="214" rx="14" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="580" y="60" font-size="13" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">DEFENSE: add MFA</text><rect x="430" y="82" width="150" height="40" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="505" y="107" font-size="10.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">has the password</text><line x1="580" y1="102" x2="640" y2="102" stroke="#16a34a" stroke-width="2.5"/><polygon points="640,96 650,102 640,108" fill="#16a34a"/><circle cx="680" cy="92" r="9" fill="none" stroke="#16a34a" stroke-width="4"/><line x1="688" y1="92" x2="710" y2="92" stroke="#16a34a" stroke-width="4"/><line x1="704" y1="92" x2="704" y2="100" stroke="#16a34a" stroke-width="4"/><line x1="710" y1="92" x2="710" y2="100" stroke="#16a34a" stroke-width="4"/><text x="580" y="152" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">also needs a phone code</text><line x1="580" y1="164" x2="580" y2="172" stroke="#16a34a" stroke-width="2.5"/><polygon points="574,172 580,182 586,172" fill="#16a34a"/><rect x="500" y="182" width="160" height="34" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="580" y="204" font-size="12" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">BLOCKED</text></svg>