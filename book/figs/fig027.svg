<svg viewBox="0 0 720 285" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><polygon points="360,40 120,250 600,250" fill="#eef3fb" stroke="#2563eb" stroke-width="2.5"/><text x="360" y="80" font-size="15" fill="#1d4ed8" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Confidentiality</text><text x="360" y="99" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">keep it secret</text><text x="360" y="116" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">encryption, access control</text><text x="200" y="232" font-size="15" fill="#1d4ed8" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Integrity</text><text x="200" y="249" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">keep it correct</text><text x="200" y="265" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">hashing, signatures</text><text x="520" y="232" font-size="15" fill="#1d4ed8" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Availability</text><text x="520" y="249" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">keep it reachable</text><text x="520" y="265" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">backups, redundancy</text><text x="360" y="180" font-size="17" fill="#16203a" font-weight="800" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SECURITY</text><rect x="300" y="196" width="120" height="26" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="360" y="213" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">protect all three</text></svg>