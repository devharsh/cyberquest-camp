<svg viewBox="0 0 740 215" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><rect x="290" y="30" width="170" height="42" rx="9" fill="#eef3fb" stroke="#2563eb" stroke-width="2"/><text x="375" y="56" font-size="13" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">len(pw) &lt; 12 ?</text><line x1="460" y1="51" x2="590" y2="51" stroke="#dc2626" stroke-width="2.5"/><polygon points="590,45 600,51 590,57" fill="#dc2626"/><text x="530" y="40" font-size="11" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">False</text><rect x="600" y="30" width="120" height="42" rx="9" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="660" y="56" font-size="11" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Good length</text><line x1="375" y1="72" x2="375" y2="110" stroke="#16a34a" stroke-width="2.5"/><polygon points="369,110 375,120 381,110" fill="#16a34a"/><text x="400" y="100" font-size="11" fill="#16a34a" font-weight="600" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">True</text><rect x="305" y="120" width="140" height="42" rx="9" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="375" y="146" font-size="12" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Too short</text><text x="375" y="195" font-size="11.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">The condition is checked once; exactly one branch runs</text></svg>