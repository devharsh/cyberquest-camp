<svg viewBox="0 0 740 262" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><text x="360" y="20" font-size="12.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">Left: input becomes part of the command. Right: input is bound as data.</text><rect x="20" y="34" width="340" height="220" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="190" y="58" font-size="14" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">ATTACK</text><rect x="40" y="72" width="300" height="44" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="190" y="99" font-size="12" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">input:  ' OR 1=1 --</text><line x1="190" y1="116" x2="190" y2="130" stroke="#dc2626" stroke-width="2.5"/><polygon points="184,130 190,140 196,130" fill="#dc2626"/><rect x="40" y="140" width="300" height="52" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="190" y="162" font-size="11" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SELECT * FROM users</text><text x="190" y="180" font-size="11" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">WHERE name='' OR 1=1 --'</text><line x1="190" y1="192" x2="190" y2="202" stroke="#dc2626" stroke-width="2.5"/><polygon points="184,202 190,212 196,202" fill="#dc2626"/><rect x="70" y="212" width="240" height="32" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="190" y="233" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">returns EVERY row  (breach)</text><rect x="380" y="34" width="340" height="220" rx="14" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/><text x="550" y="58" font-size="13.5" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">DEFENSE: parameterized</text><rect x="400" y="72" width="300" height="44" rx="8" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="550" y="99" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">input:  ' OR 1=1 --</text><line x1="550" y1="116" x2="550" y2="130" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,130 550,140 556,130" fill="#16a34a"/><rect x="400" y="140" width="300" height="52" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="162" font-size="11" fill="#16203a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">SELECT * FROM users</text><text x="550" y="180" font-size="11" fill="#16a34a" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">WHERE name = ?   (input is data)</text><line x1="550" y1="192" x2="550" y2="202" stroke="#16a34a" stroke-width="2.5"/><polygon points="544,202 550,212 556,202" fill="#16a34a"/><rect x="430" y="212" width="240" height="32" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="550" y="233" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">no match  (safe)</text></svg>