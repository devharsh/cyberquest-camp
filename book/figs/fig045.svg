<svg viewBox="0 0 760 222" style="width:100%;max-width:720px;height:auto" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="52" width="200" height="150" rx="12" fill="#eef3fb" stroke="#2563eb" stroke-width="2"/><rect x="108" y="86" width="57.8" height="71.39999999999999" rx="4" fill="#eaf1ff" stroke="#2563eb" stroke-width="2"/><line x1="115" y1="97" x2="158.8" y2="97" stroke="#2563eb" stroke-width="2"/><line x1="115" y1="106" x2="158.8" y2="106" stroke="#2563eb" stroke-width="2"/><line x1="115" y1="115" x2="153.8" y2="115" stroke="#2563eb" stroke-width="2"/><text x="140" y="188" font-size="10.5" fill="#64748b" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">a photo (looks harmless)</text><line x1="240" y1="120" x2="320" y2="120" stroke="#dc2626" stroke-width="2.5"/><polygon points="320,114 330,120 320,126" fill="#dc2626"/><text x="285" y="108" font-size="10" fill="#dc2626" font-weight="600" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">hidden EXIF</text><rect x="330" y="44" width="410" height="168" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="535" y="70" font-size="14" fill="#dc2626" font-weight="700" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">What EXIF can reveal</text><text x="360" y="100" font-size="12.5" fill="#16203a" font-weight="500" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">- date and time taken</text><text x="360" y="126" font-size="12.5" fill="#16203a" font-weight="500" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">- camera or phone model</text><text x="360" y="152" font-size="12.5" fill="#16203a" font-weight="500" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">- GPS location (sometimes)</text><text x="360" y="178" font-size="12.5" fill="#16203a" font-weight="500" text-anchor="start" font-family="Segoe UI,Arial,sans-serif">- editing software used</text></svg>