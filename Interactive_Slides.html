<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Squad 2026 - Five Day Course</title>
<style>
  :root{
    --bg:#ffffff; --ink:#16223a; --muted:#5b6b85; --line:#e2e8f0; --soft:#f4f7fb; --soft2:#eef3fb;
    --d1:#2563eb; --d2:#d97706; --d3:#7c3aed; --d4:#0891b2; --d5:#e11d48; --ai:#059669; --slate:#334155;
    --good:#16a34a; --bad:#dc2626; --warn:#d97706;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --accent:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#5566;font-family:var(--sans);color:var(--ink)}
  #deck{height:100vh;width:100vw;overflow:hidden;position:relative;background:var(--bg)}
  .slide{position:absolute;inset:0;display:none;background:var(--bg);overflow:hidden}
  .slide.active{display:block}
  .inner{padding:40px 56px 58px;min-height:100%;transform-origin:top left}
  .inner.center{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-height:calc(100vh - 0px)}
  /* header */
  .kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 4px;display:flex;gap:10px;align-items:center}
  .kick .clock{background:var(--accent);color:#fff;border-radius:5px;padding:2px 9px;font-size:11.5px;letter-spacing:.05em}
  h1{font-size:46px;line-height:1.05;margin:0 0 10px;font-weight:800;letter-spacing:-.4px}
  h2{font-size:31px;line-height:1.12;margin:0 0 12px;font-weight:780;letter-spacing:-.3px}
  h3{font-size:18px;margin:12px 0 6px;color:var(--accent);font-weight:750}
  p,li{font-size:17px;line-height:1.46}
  .lead{font-size:21px;color:var(--muted);max-width:64ch;line-height:1.4}
  .muted{color:var(--muted)} .small{font-size:14px} .tiny{font-size:12.5px}
  ul{margin:6px 0 6px 2px;padding-left:20px} li{margin:5px 0}
  b,strong{color:#0b1424}
  .grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g2a{grid-template-columns:1.3fr 1fr}.g2b{grid-template-columns:1fr 1.25fr}
  .card{background:var(--soft);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .card.tint{background:var(--soft2)}
  .bar-accent{border-top:3px solid var(--accent)}
  .pill{display:inline-block;font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff;margin:2px}
  .pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  table{border-collapse:collapse;width:100%;font-size:15px;margin:6px 0}
  th,td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  th{background:var(--accent);color:#fff;font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
  tr:nth-child(even) td{background:var(--soft)}
  code{font-family:var(--mono);background:#eaf0f8;border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.9em;color:#9333ea}
  pre{font-family:var(--mono);background:#0f172a;color:#e6edf7;border-radius:11px;padding:13px 15px;overflow:hidden;font-size:14px;line-height:1.5;margin:6px 0}
  pre .c{color:#7d8db3}.k{color:#ff9bce}.s{color:#ffd479}.f{color:#7ee0ff}.n{color:#c4b5fd}.o{color:#9be7b4}
  .def{border:1px solid var(--line);border-left:5px solid var(--accent);background:var(--soft);border-radius:10px;padding:11px 15px;margin:6px 0}
  .def .term{font-weight:800;font-size:18px;color:#0b1424}
  .def .full{font-family:var(--mono);font-size:12.5px;color:var(--accent);letter-spacing:.03em}
  .why{border-left:5px solid var(--good);background:#f0fdf4;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15.5px}
  .why b{color:#15803d}
  .news{border-left:5px solid var(--bad);background:#fef2f2;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .news b{color:#b91c1c}
  .note{border-left:5px solid var(--warn);background:#fffbeb;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .lab{border:1.5px dashed var(--accent);background:#f8fbff;border-radius:12px;padding:12px 16px;margin:4px 0}
  .lab h3{margin-top:0}
  .plat{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;font-weight:700;border-radius:7px;padding:4px 10px;margin:3px 6px 3px 0;border:1px solid var(--line)}
  .plat.colab{background:#fff7ed;color:#b45309;border-color:#fed7aa}
  .plat.range{background:#ecfeff;color:#0e7490;border-color:#a5f3fc}
  .plat.kali{background:#0f172a;color:#7ee0ff;border-color:#0f172a}
  .plat.web{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
  .kc{border:1.5px solid var(--d3);background:#faf5ff;border-radius:12px;padding:12px 16px;margin:6px 0}
  .kc h3{color:var(--d3);margin:0 0 4px}
  .kc .q{font-weight:700;font-size:16.5px}
  .kc button{font-family:var(--mono);font-size:12.5px;background:var(--d3);color:#fff;border:0;border-radius:7px;padding:6px 13px;cursor:pointer;font-weight:700;margin-top:8px}
  .kc .ans{display:none;margin-top:8px;border-top:1px solid #e9d5ff;padding-top:8px;font-size:15px}
  .kc.show .ans{display:block}
  .stat{font-family:var(--mono);font-weight:800;line-height:1;color:var(--accent)}
  .flex{display:flex;gap:18px;align-items:center}.col{flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .tl{position:relative;margin:8px 0 0 6px;padding-left:22px;border-left:3px solid var(--line)}
  .tl .ev{position:relative;margin:0 0 12px}
  .tl .ev:before{content:"";position:absolute;left:-29px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent)}
  .tl .ev .t{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700}
  /* chrome */
  .pbar{position:fixed;top:0;left:0;height:4px;background:var(--accent);z-index:60;transition:width .2s}
  .foot{position:absolute;left:0;right:0;bottom:0;height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);background:#fff}
  .foot .sec{color:var(--accent);font-weight:700}
  .ctrl{position:fixed;right:14px;bottom:46px;display:flex;gap:7px;z-index:40}
  .ctrl button,.menub{font-family:var(--mono);font-size:12px;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;box-shadow:0 2px 8px rgba(20,40,80,.08)}
  .ctrl button:hover,.menub:hover{border-color:var(--accent);color:var(--accent)}
  .menub{position:fixed;left:14px;top:10px;z-index:60}
  #toc{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:70;display:none;padding:50px 6vw;overflow:auto}
  #toc.open{display:block}#toc h2{margin-top:0}
  #toc .close{position:fixed;right:20px;top:14px}
  #toc .grp{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  #toc a{display:inline-block;width:48%;color:var(--ink);text-decoration:none;padding:7px 11px;border:1px solid var(--line);border-radius:8px;margin:3px .5%;font-size:14px}
  #toc a:hover{border-color:var(--accent);color:var(--accent);background:var(--soft)}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--accent);color:var(--accent);border-radius:999px;padding:6px 16px;font-family:var(--mono);font-size:12.5px;font-weight:700}
  svg{max-width:100%}
  @media print{.slide{display:block!important;position:relative;height:auto;page-break-after:always}.inner{transform:none!important;zoom:1!important}.ctrl,.menub,.pbar{display:none}}
</style>
</head>

S({sec:'Day 3',kick:'Lesson',title:'The Caesar cipher',html:`
<div class="grid g2"><div>${card('<h3 style="margin-top:0">Shift every letter</h3><p class="small">Caesar shifted letters by a fixed amount. With only 25 shifts, a computer brute-forces it instantly.</p>')}</div><div>${codeRun(`def caesar(t, s):
    o = ""
    for c in t:
        if c.isalpha():
            b = 65 if c.isupper() else 97
            o += chr((ord(c)-b+s) % 26 + b)
        else: o += c
    return o`,plat('colab','Module 1 in Day3.ipynb'))}</div></div>`});

  const toclist = document.getElementById('toclist');
  let tocHTML = '';
  let lastSec = '';

  SLIDES.forEach((s, idx) => {
    // 1. Generate structural DOM node for the slide container
    const div = document.createElement('div');
    div.className = `slide ${idx === 0 ? 'active' : ''}`;
    
    // Determine inner layout template mapping rules
    let innerClass = (s.t === 'cover' || s.t === 'divider') ? 'inner center' : 'inner';
    let headerHTML = '';
    
    if (s.t !== 'cover' && s.t !== 'divider') {
      headerHTML = `
        <div class="kick">
          ${s.sec} ${s.time ? `<span class="clock">${s.time}</span>` : ''} 
          ${s.kick ? ` &middot; ${s.kick}` : ''}
        </div>
        ${s.title ? `<h2>${s.title}</h2>` : ''}
      `;
    }

    div.innerHTML = `
      <div class="${innerClass}" style="border-top: 8px solid ${ACC[s.sec] || '#334155'}">
        ${headerHTML}
        ${s.html}
      </div>
      <div class="foot">
        <div><span class="sec">${s.sec.toUpperCase()}</span> ${s.title ? `&middot; ${s.title}` : ''}</div>
        <div>${idx + 1} / ${SLIDES.length}</div>
      </div>
    `;
    deck.appendChild(div);

    // 2. Build the interactive dynamic Table of Contents entries
    if (s.sec !== lastSec) {
      tocHTML += `<div class="grp">${s.sec}</div>`;
      lastSec = s.sec;
    }
    let label = s.title || (s.t === 'cover' ? 'Course Cover Title' : 'Introduction Unit');
    tocHTML += `<a href="#" onclick="jumpTo(${idx}); return false;">${idx + 1}. ${label}</a>`;
  });

  toclist.innerHTML = tocHTML;
  updateProgress();
}

function go(dir) {
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + dir + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  updateProgress();
}

function jumpTo(idx) {
  const slides = document.querySelectorAll('.slide');
  if (idx < 0 || idx >= slides.length) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = idx;
  slides[currentSlide].classList.add('active');
  toggleTOC(false);
  updateProgress();
}

function toggleTOC(force) {
  const toc = document.getElementById('toc');
  if (typeof force === 'boolean') {
    if (force) toc.classList.add('open');
    else toc.classList.remove('open');
  } else {
    toc.classList.toggle('open');
  }
}

function updateProgress() {
  const pbar = document.getElementById('pbar');
  if (SLIDES.length === 0) return;
  const pct = ((currentSlide + 1) / SLIDES.length) * 100;
  pbar.style.width = `${pct}%`;
}

/* Bind native browser control interactions */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    go(1);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    go(-1);
  }
  if (e.key.toLowerCase() === 'c') {
    toggleTOC();
  }
  if (e.key.toLowerCase() === 'f') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
});

/* Trigger setup on engine completion initialization */
window.onload = initDeck;
</script>
</body>
