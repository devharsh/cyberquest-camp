<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Squad 2026 - Five Day Course</title>
<style>
  :root{
    --bg:#ffffff; --ink:#16223a; --muted:#5b6b85; --line:#e2e8f0; --soft:#f4f7fb; --soft2:#eef3fb;
    --d1:#2563eb; --d2:#d97706; --d3:#7c3aed; --d4:#0891b2; --d5:#e11d48; --ai:#059669; --slate:#334155;
    --good:#16a34a; --bad:#dc2626; --warn:#d97706;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --accent:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#5566;font-family:var(--sans);color:var(--ink)}
  #deck{height:100vh;width:100vw;overflow:hidden;position:relative;background:var(--bg)}
  .slide{position:absolute;inset:0;display:none;background:var(--bg);overflow:hidden}
  .slide.active{display:block}
  .inner{padding:40px 56px 58px;min-height:100%;transform-origin:top left}
  .inner.center{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-height:calc(100vh - 0px)}
  /* header */
  .kick{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 4px;display:flex;gap:10px;align-items:center}
  .kick .clock{background:var(--accent);color:#fff;border-radius:5px;padding:2px 9px;font-size:11.5px;letter-spacing:.05em}
  h1{font-size:46px;line-height:1.05;margin:0 0 10px;font-weight:800;letter-spacing:-.4px}
  h2{font-size:31px;line-height:1.12;margin:0 0 12px;font-weight:780;letter-spacing:-.3px}
  h3{font-size:18px;margin:12px 0 6px;color:var(--accent);font-weight:750}
  p,li{font-size:17px;line-height:1.46}
  .lead{font-size:21px;color:var(--muted);max-width:64ch;line-height:1.4}
  .muted{color:var(--muted)} .small{font-size:14px} .tiny{font-size:12.5px}
  ul{margin:6px 0 6px 2px;padding-left:20px} li{margin:5px 0}
  b,strong{color:#0b1424}
  .grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g2a{grid-template-columns:1.3fr 1fr}.g2b{grid-template-columns:1fr 1.25fr}
  .card{background:var(--soft);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .card.tint{background:var(--soft2)}
  .bar-accent{border-top:3px solid var(--accent)}
  .pill{display:inline-block;font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff;margin:2px}
  .pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  table{border-collapse:collapse;width:100%;font-size:15px;margin:6px 0}
  th,td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  th{background:var(--accent);color:#fff;font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
  tr:nth-child(even) td{background:var(--soft)}
  code{font-family:var(--mono);background:#eaf0f8;border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.9em;color:#9333ea}
  pre{font-family:var(--mono);background:#0f172a;color:#e6edf7;border-radius:11px;padding:13px 15px;overflow:hidden;font-size:14px;line-height:1.5;margin:6px 0}
  pre .c{color:#7d8db3}.k{color:#ff9bce}.s{color:#ffd479}.f{color:#7ee0ff}.n{color:#c4b5fd}.o{color:#9be7b4}
  .def{border:1px solid var(--line);border-left:5px solid var(--accent);background:var(--soft);border-radius:10px;padding:11px 15px;margin:6px 0}
  .def .term{font-weight:800;font-size:18px;color:#0b1424}
  .def .full{font-family:var(--mono);font-size:12.5px;color:var(--accent);letter-spacing:.03em}
  .why{border-left:5px solid var(--good);background:#f0fdf4;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15.5px}
  .why b{color:#15803d}
  .news{border-left:5px solid var(--bad);background:#fef2f2;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .news b{color:#b91c1c}
  .note{border-left:5px solid var(--warn);background:#fffbeb;border-radius:10px;padding:10px 15px;margin:6px 0;font-size:15px}
  .lab{border:1.5px dashed var(--accent);background:#f8fbff;border-radius:12px;padding:12px 16px;margin:4px 0}
  .lab h3{margin-top:0}
  .plat{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12.5px;font-weight:700;border-radius:7px;padding:4px 10px;margin:3px 6px 3px 0;border:1px solid var(--line)}
  .plat.colab{background:#fff7ed;color:#b45309;border-color:#fed7aa}
  .plat.range{background:#ecfeff;color:#0e7490;border-color:#a5f3fc}
  .plat.kali{background:#0f172a;color:#7ee0ff;border-color:#0f172a}
  .plat.web{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
  .kc{border:1.5px solid var(--d3);background:#faf5ff;border-radius:12px;padding:12px 16px;margin:6px 0}
  .kc h3{color:var(--d3);margin:0 0 4px}
  .kc .q{font-weight:700;font-size:16.5px}
  .kc button{font-family:var(--mono);font-size:12.5px;background:var(--d3);color:#fff;border:0;border-radius:7px;padding:6px 13px;cursor:pointer;font-weight:700;margin-top:8px}
  .kc .ans{display:none;margin-top:8px;border-top:1px solid #e9d5ff;padding-top:8px;font-size:15px}
  .kc.show .ans{display:block}
  .stat{font-family:var(--mono);font-weight:800;line-height:1;color:var(--accent)}
  .flex{display:flex;gap:18px;align-items:center}.col{flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .tl{position:relative;margin:8px 0 0 6px;padding-left:22px;border-left:3px solid var(--line)}
  .tl .ev{position:relative;margin:0 0 12px}
  .tl .ev:before{content:"";position:absolute;left:-29px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent)}
  .tl .ev .t{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700}
  /* chrome */
  .pbar{position:fixed;top:0;left:0;height:4px;background:var(--accent);z-index:60;transition:width .2s}
  .foot{position:absolute;left:0;right:0;bottom:0;height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted);background:#fff}
  .foot .sec{color:var(--accent);font-weight:700}
  .ctrl{position:fixed;right:14px;bottom:46px;display:flex;gap:7px;z-index:40}
  .ctrl button,.menub{font-family:var(--mono);font-size:12px;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;box-shadow:0 2px 8px rgba(20,40,80,.08)}
  .ctrl button:hover,.menub:hover{border-color:var(--accent);color:var(--accent)}
  .menub{position:fixed;left:14px;top:10px;z-index:60}
  #toc{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:70;display:none;padding:50px 6vw;overflow:auto}
  #toc.open{display:block}#toc h2{margin-top:0}
  #toc .close{position:fixed;right:20px;top:14px}
  #toc .grp{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  #toc a{display:inline-block;width:48%;color:var(--ink);text-decoration:none;padding:7px 11px;border:1px solid var(--line);border-radius:8px;margin:3px .5%;font-size:14px}
  #toc a:hover{border-color:var(--accent);color:var(--accent);background:var(--soft)}
  .badge{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--accent);color:var(--accent);border-radius:999px;padding:6px 16px;font-family:var(--mono);font-size:12.5px;font-weight:700}
  svg{max-width:100%}
  @media print{.slide{display:block!important;position:relative;height:auto;page-break-after:always}.inner{transform:none!important;zoom:1!important}.ctrl,.menub,.pbar{display:none}}
</style>
</head>

S({sec:'Day 2',kick:'Cyber News',title:'The password problem is real',html:`
${news('The most common password, every single year:','password managers such as NordPass publish an annual list, and 123456 and password sit at the top again and again. A modern computer guesses either one in well under a second.')}${news('Why it keeps happening:','people reuse a few easy passwords everywhere. When one site is breached, attackers try those same passwords on every other account, a trick called credential stuffing.')}`});

S({sec:'Day 2',kick:'Lesson',title:'The CIA triad',html:`
<div class="grid g3"><div>${def('Confidentiality','keep it secret','Only authorized people can view the data. Tools: encryption, access control, and good passwords. A leaked customer database breaks this pillar.')}</div><div>${def('Integrity','keep it correct','Only authorized people can change the data, and you can detect tampering. Tools: hashing and digital signatures. Changing a bank balance without permission breaks this.')}</div><div>${def('Availability','keep it reachable','Authorized people can use the data when they need it. Tools: backups and redundancy. A denial-of-service attack that takes a site offline breaks this.')}</div></div>${why('Every attack you study breaks one or more of these three pillars, and every defense protects one or more of them. It is the lens professionals use to reason about security.')}`});

S({sec:'Day 2',kick:'Knowledge Check',title:'Quick check',html:`
${kc('A ransomware attack encrypts a hospital files so staff cannot open them. Which CIA pillar is broken?','Availability: the data still exists and is still secret, but authorized staff can no longer use it when they need it.')}`});

S({sec:'Day 2',kick:'Lesson',title:'How passwords are attacked',html:`
<div class="grid g2"><div>${def('Brute force','try every combination','An attacker tries every possible password until one works. Speed matters: on stolen password hashes, attackers can test billions of guesses per second.')}${def('Keyspace','all possible passwords','Equals N to the power L, where N is how many characters are allowed and L is the length. Bigger N and bigger L both make the number explode.')}</div><div>${card('<h3 style="margin-top:0">A concrete feel for the numbers</h3><p class="small">An 8-character lowercase password has 26 to the 8 combinations, about 209 billion. That sounds huge, but at a billion guesses a second it can fall in minutes. Add length and symbols and the time grows astronomically.</p>')}</div></div>`});

S({sec:'Day 2',kick:'Lesson',title:'The math of cracking',html:`
<div class="grid g2"><div>${card('<h3 style="margin-top:0">Time to crack</h3><p class="small">Time equals the number of combinations divided by guesses per second. Run the numbers in the notebook and watch how each extra character multiplies the time, while switching from letters to symbols helps far less than length does.</p>')}</div><div>${codeRun(`def crack_years(N, L, gps=1_000_000_000):
    return (N ** L) / gps / (60*60*24*365)

for L in [6, 8, 12, 16]:
    print(L, "chars:", crack_years(95, L), "years")`,plat('colab','Modules 1 and 2 in Day2.ipynb'))}</div></div>`});

S({sec:'Day 2',kick:'Lesson',title:'Hashing and salting',html:`
<div class="grid g2"><div>${def('Hash','a one-way fingerprint','A function like SHA-256 turns any input into a fixed-length fingerprint that cannot be reversed. Good sites store the hash of your password, never the password itself, so a database leak does not hand over your actual password.')}${def('Salt','random extra data','Random text added before hashing, unique per user, so two people with the same password get different hashes. This stops attackers from cracking many accounts at once with precomputed tables.')}</div><div>${card('<h3 style="margin-top:0">See it in code</h3><p class="small">Module 4 hashes the same password twice with no salt (identical results) and then with two different salts (completely different results). That difference is the whole point of salting.</p>')}</div></div>`});

S({sec:'Day 2',kick:'Lesson',title:'MFA and phishing',html:`
<div class="grid g2"><div>${def('MFA','Multi-Factor Authentication','Requiring two or more proofs of identity: something you know (a password), something you have (a phone or security key), or something you are (a fingerprint). A stolen password alone is then useless.')}${def('2FA','Two-Factor Authentication','MFA with exactly two factors, such as a password plus a one-time code. Turning it on is the single best thing most people can do for account safety.')}</div><div>${card('<h3 style="margin-top:0">Spotting phishing</h3><p class="small">Phishing is a fake message that tricks you into giving up a password or code. Red flags: a sense of urgency, a generic greeting, spelling errors, and a look-alike link such as paypa1.com that uses the digit 1 in place of the letter l. When unsure, type the real address yourself.</p>')}</div></div>`});

S({sec:'Day 2',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Why does adding length usually beat adding symbols for password strength?','Because length increases the exponent L in N to the power L, which multiplies the total combinations far faster than enlarging the character set N does.')}`});

S({sec:'Day 3',kick:'Cyber News',title:'Cryptography changes history',html:`
${news('World War Two:','the German military trusted the Enigma cipher machine. A team at Bletchley Park in Britain, including the mathematician Alan Turing, built machines to break it, and historians estimate this work helped shorten the war by years.')}${news('Today:','the same field quietly protects you every time you see a padlock in your browser. HTTPS uses encryption so that no one between you and a website can read your traffic.')}`});

S({sec:'Day 3',kick:'Lesson',title:'Three ideas, never mix them',html:`
<div class="grid g3"><div>${def('Encoding','Base64, URL encoding','Reformatting data so it survives travel. It uses no key and provides no secrecy, so anyone can reverse it. Use it for transport, never for protection.')}</div><div>${def('Encryption','AES, RSA','Scrambling data with a secret key so only someone with the right key can read it. This is real protection for confidentiality.')}</div><div>${def('Hashing','SHA-256','A one-way fingerprint you cannot reverse. Used to check integrity and to store passwords safely.')}</div></div>${why('Mixing these up is one of the most common beginner mistakes. Base64 looks scrambled but protects nothing, while a hash protects integrity but cannot be turned back into the original.')}`});

S({sec:'Day 3',kick:'Knowledge Check',title:'Quick check',html:`
${kc('A website stores your password as a Base64 string. Is that safe?','No. Base64 is encoding, not encryption, so anyone can decode it instantly. Passwords should be salted and hashed, not encoded.')}`});

S({sec:'Day 3',kick:'Lesson',title:'The Caesar cipher',html:`
<div class="grid g2"><div>${card('<h3 style="margin-top:0">Shift every letter</h3><p class="small">Julius Caesar shifted each letter by a fixed amount, so with a shift of 3 the letter A becomes D. It is easy to use, but with only 25 possible shifts a computer simply tries them all in an instant. That weakness is why modern ciphers use enormous keys.</p>')}</div><div>${codeRun(`def caesar(t, s):
    o = ""
    for c in t:
        if c.isalpha():
            b = 65 if c.isupper() else 97
            o += chr((ord(c)-b+s) % 26 + b)
        else: o += c
    return o
# caesar("Attack at dawn", 3) -> "Dwwdfn dw gdzq"`,plat('colab','Module 1 in Day3.ipynb'))}</div></div>`});

S({sec:'Day 3',kick:'Knowledge Check',title:'Quick check',html:`
${kc('Why can a hash protect a password even if attackers steal the hash database?','Because hashing is one-way: you cannot compute the original password from the hash. With salting added, attackers also cannot reuse precomputed tables, so each password must be attacked slowly and separately.')}`});

S({sec:'Day 3',kick:'Worked Example',title:'RSA with tiny numbers',html:`
<div class="grid g2"><div>${card('<h3 style="margin-top:0">Public and private keys</h3><p class="small">RSA uses a pair of keys. Pick two primes p=5 and q=11, so n = p times q = 55. The public key is (e=3, n=55) and the private key is (d=27, n=55). Anyone can encrypt with the public key, but only the holder of the private key can decrypt.</p>')}${why('Real RSA uses primes hundreds of digits long. Its security rests on the fact that multiplying two big primes is easy, but factoring the result back into those primes is practically impossible.')}</div><div>${codeRun(`def rsa(m, key):
    e, n = key
    return pow(m, e, n)

c = rsa(7, (3, 55))      # encrypt the number 7 -> 13
print(rsa(c, (27, 55)))  # decrypt 13 -> 7`,plat('colab','Module 4 in Day3.ipynb'))}</div></div>`});

S({sec:'Day 4',kick:'Lesson',title:'SQL injection and XSS',html:`

/* ============================ JAVASCRIPT SLIDESHOW ENGINE ============ */
let currentSlide = 0;

function initDeck() {
  const deck = document.getElementById('deck');
  const toclist = document.getElementById('toclist');
  let tocHTML = '';
  let lastSec = '';

  SLIDES.forEach((s, idx) => {
    // 1. Generate structural DOM node for the slide container
    const div = document.createElement('div');
    div.className = `slide ${idx === 0 ? 'active' : ''}`;
    
    // Determine inner layout template mapping rules
    let innerClass = (s.t === 'cover' || s.t === 'divider') ? 'inner center' : 'inner';
    let headerHTML = '';
    
    if (s.t !== 'cover' && s.t !== 'divider') {
      headerHTML = `
        <div class="kick">
          ${s.sec} ${s.time ? `<span class="clock">${s.time}</span>` : ''} 
          ${s.kick ? ` &middot; ${s.kick}` : ''}
        </div>
        ${s.title ? `<h2>${s.title}</h2>` : ''}
      `;
    }

    div.innerHTML = `
      <div class="${innerClass}" style="border-top: 8px solid ${ACC[s.sec] || '#334155'}">
        ${headerHTML}
        ${s.html}
      </div>
      <div class="foot">
        <div><span class="sec">${s.sec.toUpperCase()}</span> ${s.title ? `&middot; ${s.title}` : ''}</div>
        <div>${idx + 1} / ${SLIDES.length}</div>
      </div>
    `;
    deck.appendChild(div);

    // 2. Build the interactive dynamic Table of Contents entries
    if (s.sec !== lastSec) {
      tocHTML += `<div class="grp">${s.sec}</div>`;
      lastSec = s.sec;
    }
    let label = s.title || (s.t === 'cover' ? 'Course Cover Title' : 'Introduction Unit');
    tocHTML += `<a href="#" onclick="jumpTo(${idx}); return false;">${idx + 1}. ${label}</a>`;
  });

  toclist.innerHTML = tocHTML;
  updateProgress();
}

function go(dir) {
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + dir + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  updateProgress();
}

function jumpTo(idx) {
  const slides = document.querySelectorAll('.slide');
  if (idx < 0 || idx >= slides.length) return;
  
  slides[currentSlide].classList.remove('active');
  currentSlide = idx;
  slides[currentSlide].classList.add('active');
  toggleTOC(false);
  updateProgress();
}

function toggleTOC(force) {
  const toc = document.getElementById('toc');
  if (typeof force === 'boolean') {
    if (force) toc.classList.add('open');
    else toc.classList.remove('open');
  } else {
    toc.classList.toggle('open');
  }
}

function updateProgress() {
  const pbar = document.getElementById('pbar');
  if (SLIDES.length === 0) return;
  const pct = ((currentSlide + 1) / SLIDES.length) * 100;
  pbar.style.width = `${pct}%`;
}

/* Bind native browser control interactions */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    go(1);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    go(-1);
  }
  if (e.key.toLowerCase() === 'c') {
    toggleTOC();
  }
  if (e.key.toLowerCase() === 'f') {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
});

/* Trigger setup on engine completion initialization */
window.onload = initDeck;
</script>
